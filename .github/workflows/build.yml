name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-15          # Apple Silicon, Xcode 16.x

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Debug
        run: |
          xcodebuild \
            -scheme GCloudMenuBar \
            -configuration Debug \
            -derivedDataPath build/derived \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: Release
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild \
            -scheme GCloudMenuBar \
            -configuration Release \
            -archivePath build/GCloudMenuBar.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app
        run: |
          ditto -c -k --keepParent \
            "build/GCloudMenuBar.xcarchive/Products/Applications/GCloudMenuBar.app" \
            "build/GCloudMenuBar.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/GCloudMenuBar.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
